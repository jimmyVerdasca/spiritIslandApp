name: Build Android APK

on:
  workflow_dispatch:


jobs:

  build:

    name: Build APK
    runs-on: ubuntu-22.04


    steps:

      - name: Checkout repository
        uses: actions/checkout@v5


      # Cache Android SDK, NDK, Gradle, Buildozer downloads
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-


      # Cache Python packages
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            pip-${{ runner.os }}-


      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-venv \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            cmake


      - name: Set Java 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH


      - name: Install Buildozer
        run: |
          pip install --user buildozer


      - name: Add Buildozer to PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH


      - name: Build APK
        env:
          ACCEPT_ANDROID_SDK_LICENSES: "yes"
        run: |
          yes | buildozer android debug


      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: spirit-island-debug-apk
          path: bin/*.apk